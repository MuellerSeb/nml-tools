[helper]
path = "fortran/generated/nml_helper.f90"
module = "nml_helper"
buffer = 512

[constants]
[constants.str_len]
value = 128
doc = "String buffer length for the pybind example."

[kinds]
module = "iso_fortran_env"
real = ["real64"]
integer = ["int32"]
map = { dp = "real64", i4 = "int32" }

[f2py]
f2cmap_path = "f2py/generated/.f2py_f2cmap"

[f2py.c_types.real]
dp = "double"

[f2py.c_types.integer]
i4 = "int"

[[namelists]]
schema = "schema/config.yml"
mod_path = "fortran/generated/nml_config.f90"
f2py_path = "f2py/generated/f2py_config.f90"
py_path = "src/nml_pybind_example/config_wrappers.py"

name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Upgrade pip/setuptools/wheel/hatchling
        run: python -m pip install -U pip setuptools wheel hatchling coveralls
      - name: Install dev deps
        run: python -m pip install -vve ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Pytest with coverage
        run: python -m pytest --cov nml_tools --cov-report term-missing -v tests/
      - name: Upload coverage to Coveralls
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m coveralls

  fortran-examples:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gfortran
            experimental: false
            debug_flags: -g -O0 -fbacktrace -fcheck=all
          - compiler: ifx
            experimental: false
            debug_flags: -g -O0 -traceback -check all
          - compiler: flang-new
            experimental: false
            debug_flags: -g -O0
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Setup Fortran
        uses: gha3mi/setup-fortran-conda@v0.15.3
        with:
          compiler: ${{ matrix.compiler }}
          extra-packages: pip
      - name: Install Python build tools
        run: python -m pip install -U pip build pytest
      - name: Install nml-tools
        run: python -m pip install -e .
      - name: Check generated 01_simple files
        run: nml-tools check --config examples/01_simple/nml-config.toml --diff
      - name: Check generated 02_pybind files
        run: nml-tools check --config examples/02_pybind/pyproject.toml --diff
      - name: Check generated 03_references files
        run: nml-tools check --config examples/03_references/nml-config.toml --diff
      - name: Check generated 04_derived_types files
        run: nml-tools check --config examples/04_derived_types/pyproject.toml --diff
      - name: Check generated 05_file_profiles files
        run: nml-tools check --config examples/05_file_profiles/nml-config.toml --diff
      - name: Validate 03_references template
        run: >
          nml-tools validate --config examples/03_references/nml-config.toml
          examples/03_references/out/reference-demo.nml
      - name: Validate 04_derived_types template
        run: >
          nml-tools validate --config examples/04_derived_types/pyproject.toml
          examples/04_derived_types/templates/run.nml
      - name: Validate 05_file_profiles main profile
        run: >
          nml-tools validate --config examples/05_file_profiles/nml-config.toml
          --profile main
          examples/05_file_profiles/run.nml
      - name: Validate 05_file_profiles outputs profile
        run: >
          nml-tools validate --config examples/05_file_profiles/nml-config.toml
          --profile outputs
          examples/05_file_profiles/outputs.nml
      - name: Build 01_simple
        run: >
          cmake -S examples/01_simple -B build/01_simple -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_Fortran_FLAGS_DEBUG="${{ matrix.debug_flags }}"
      - name: Compile 01_simple
        run: cmake --build build/01_simple --parallel
      - name: Run 01_simple
        env:
          GFORTRAN_ERROR_BACKTRACE: "1"
        run: ./build/01_simple/nml_optimization_example examples/01_simple/out/optimization.nml
      - name: Build 02_pybind package
        run: python -m pip install -e "examples/02_pybind[test]"
      - name: Test 02_pybind package
        run: python -m pytest -q examples/02_pybind/tests
      - name: Build 04_derived_types package
        run: python -m pip install -e "examples/04_derived_types[test]"
      - name: Test 04_derived_types package
        run: python -m pytest -q examples/04_derived_types/tests

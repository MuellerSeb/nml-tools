name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Upgrade pip/setuptools/wheel/hatchling
        run: python -m pip install -U pip setuptools wheel hatchling coveralls
      - name: Install dev deps
        run: python -m pip install -vve ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy src
      - name: Pytest with coverage
        run: python -m pytest --cov nml_tools --cov-report term-missing -v tests/
      - name: Upload coverage to Coveralls
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m coveralls

  fortran-examples:
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gfortran
            experimental: false
          - compiler: ifx
            experimental: true
          - compiler: flang-new
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Setup Fortran
        uses: gha3mi/setup-fortran-conda@v0.15.3
        with:
          compiler: ${{ matrix.compiler }}
          extra-packages: pip
      - name: Install Python build tools
        run: python -m pip install -U pip build pytest
      - name: Build 01_simple
        run: cmake -S examples/01_simple -B build/01_simple -G Ninja
      - name: Compile 01_simple
        run: cmake --build build/01_simple --parallel
      - name: Run 01_simple
        run: ./build/01_simple/nml_optimization_example examples/01_simple/out/optimization.nml
      - name: Build 02_pybind package
        run: python -m pip install -e "examples/02_pybind[test]"
      - name: Test 02_pybind package
        run: python -m pytest -q examples/02_pybind/tests
